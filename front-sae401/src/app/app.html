<div class="page-container">
  <app-navbar></app-navbar>
  <app-accueil></app-accueil>

  <section class="statistiques page-content">
    <h1>Statistiques logements</h1>

    <div *ngIf="errorMessage()" class="error">Erreur : {{ errorMessage() }}</div>
    <div *ngIf="!errorMessage() && logements().length === 0">Chargement…</div>

    <table *ngIf="!errorMessage() && logements().length > 0">
      <thead>
        <tr>
          <th>Département</th>
          <th>Nombre logements</th>
          <th>Construction</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let logement of logements()">
          <td>{{ logement.departement?.nom }}</td>
          <td>{{ logement.nombreLogement }}</td>
          <td>{{ logement.construction }}</td>
        </tr>
      </tbody>
    </table>
  </section>

  <app-footer></app-footer>
</div>
