<div class="chart-card" style="margin-top: 24px;">
    <!-- En-tête du deuxième graphique -->
    <div class="chart-header">
        <h2 class="chart-title" style="margin-bottom: 16px;">
            Rénovation ou Construction : Quelle Stratégie ?
            <!-- On affiche le nom de la région/département choisi dans le titre -->
            <span *ngIf="selectedRegion()"> - {{ selectedRegion()?.nom }}</span>
            <span *ngIf="selectedDepartement()"> / {{ selectedDepartement()?.nom }}</span>
        </h2>

        <!-- Filtres locaux spécifiques au deuxième graphique -->
        <div class="search-container" style="display: flex; gap: 16px; margin-bottom: 24px;">
            <!-- Select pour choisir une Région -->
            <select class="search-input" style="width: auto; margin-bottom: 0;" [ngModel]="selectedRegion()?.code ?? ''"
                (ngModelChange)="onRegionChange($event)">
                <option value="">Toutes les régions</option>
                <option *ngFor="let region of regions()" [value]="region.code">
                    {{ region.nom }}
                </option>
            </select>

            <!-- Select pour choisir un Département -->
            <select class="search-input" style="width: auto; margin-bottom: 0;"
                [ngModel]="selectedDepartement()?.code ?? ''" (ngModelChange)="onDepartementChange($event)">
                <option value="">Tous les départements</option>
                <option *ngFor="let dept of departementsFiltres()" [value]="dept.code">
                    {{ dept.nom }} ({{ dept.code }})
                </option>
            </select>

            <!-- Bouton de reset local -->
            <button class="btn-secondary" style="margin-top: 0; width: auto;" (click)="clearFilter()">
                Réinitialiser les filtres
            </button>
        </div>
    </div>

    <!-- Zone de rendu pour le graphique 2 -->
    <div class="canvas-container">
        <!-- Message d'erreur -->
        <div *ngIf="errorMessage()" class="alert alert-error">
            {{ errorMessage() }}
        </div>

        <!-- Message de chargement ou d'absence de données -->
        <div *ngIf="!errorMessage() && logementsFiltres().length === 0" class="empty-state">
            {{ selectedRegion() || selectedDepartement() ? 'Aucune donnée pour cette sélection.' : 'Chargement...' }}
        </div>

        <!-- Zone du Canvas (dessin Chart.js) -->
        <div *ngIf="!errorMessage() && logementsFiltres().length > 0">
            <canvas #tauxP></canvas>
        </div>
    </div>
</div>
